<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ShrinkSmart</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0B1628;
      color: #E8EDF3;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: 0.5px;
    }
    p {
      font-size: 14px;
      color: #7F9FCC;
      margin: 0;
      max-width: 420px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>ShrinkSmart</h1>
      <p>Site under construction. Please check back soon.</p>
    </div>
  </div>
</body>
</html>
